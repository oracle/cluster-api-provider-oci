name: Release

on:
  push:
    # Build and publish artifacts for a release
    tags:
      - "v*.*.*"

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2

      - name: Log into GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${GITHUB_ACTOR,,} --password-stdin

      - name: Set up Go
        uses: actions/setup-go@bfdd3570ce990073878bf10f6b2d79082de49492 # v2
        with:
          go-version: 1.17

      - name: Build Release Artifacts
        run: RELEASE_TAG="${{ github.ref_name }}" make release

      - name: Update crds docs
        run: |
          echo "Release Tag: ${{ github.ref_name }}" 
          curl -sSL https://doc.crds.dev/github.com/oracle/cluster-api-provider-oci@${{ github.ref_name }}

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: out/*

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: CAPOCI Artifacts
          path: out/
