---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: OCICluster
metadata:
  name: "${CLUSTER_NAME}"
spec:
  networkSpec:
    apiServerLoadBalancer:
      nlbSpec:
        backendSets:
          - name: apiserver-lb-backendset
            backendSetDetails:
              healthChecker:
                urlPath: /healthz
          - name: apiserver-lb-backendset-2
            listenerPort: ${API_SERVER_SECONDARY_LISTENER_PORT:=9345}
            backendSetDetails:
              healthChecker:
                urlPath: /readyz
